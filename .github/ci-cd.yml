name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  API_IMAGE: devops-monitor-api
  DASHBOARD_IMAGE: devops-monitor-dashboard

jobs:
  # ── Job 1: lint + test ──────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt flake8

      - name: Lint with flake8
        run: flake8 api/ dashboard/ tests/ --max-line-length=100

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=api --cov-fail-under=75

  # ── Job 2: build & push to ACR ─────────────────────────────────────────────
  build:
    name: Build & Push to ACR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_NAME }}.azurecr.io
          username: ${{ secrets.AZURE_CLIENT_ID }}
          password: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.API_IMAGE }}:${{ github.sha }},${{ secrets.ACR_NAME }}.azurecr.io/${{ env.API_IMAGE }}:latest

      - name: Build & push Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: dashboard/Dockerfile
          push: true
          tags: ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.DASHBOARD_IMAGE }}:${{ github.sha }},${{ secrets.ACR_NAME }}.azurecr.io/${{ env.DASHBOARD_IMAGE }}:latest

  # ── Job 3: deploy to Azure Container Apps ──────────────────────────────────
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}"}'

      - name: Deploy API to Container Apps
        run: |
          az containerapp update \
            --name devops-monitor-api \
            --resource-group devops-monitor-rg \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.API_IMAGE }}:${{ github.sha }}

      - name: Deploy Dashboard to Container Apps
        run: |
          az containerapp update \
            --name devops-monitor-dashboard \
            --resource-group devops-monitor-rg \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.DASHBOARD_IMAGE }}:${{ github.sha }}
